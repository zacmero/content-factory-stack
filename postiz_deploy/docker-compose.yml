version: '3'

services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz_standalone
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MAIN_URL=${MAIN_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
      - JWT_SECRET=${JWT_SECRET}
      - IS_GENERAL=${IS_GENERAL}
      - TEMPORAL_ADDRESS=temporal:7233
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      # Database
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORKERS=true
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      temporal:
        condition: service_started
    volumes:
      - postiz_uploads:/app/uploads

  temporal:
    image: temporalio/auto-setup:latest
    container_name: postiz_standalone_temporal
    restart: always
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=db
      - DBNAME=temporal
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: postiz_standalone_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postiz_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: postiz_standalone_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - postiz_redis_data:/data

volumes:
  postiz_uploads:
  postiz_db_data:
  postiz_redis_data:
