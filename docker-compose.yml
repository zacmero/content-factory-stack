services:
  # --------------------------------------------------------------------------------
  # APP: n8n
  # --------------------------------------------------------------------------------
  n8n:
    build:
      context: .
      dockerfile: n8n.Dockerfile
    container_name: n8n
    restart: unless-stopped
    ports:
      - "8080:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:8080/
      - GENERIC_TIMEZONE=America/New_York
      - DB_TYPE=sqlite
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - OPENAI_API_KEY=local
      - OPENAI_BASE_URL=http://host.docker.internal:8081/v1
      - OPENAI_MODEL=bonsai-8b
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID:-}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET:-}
      - REDDIT_REFRESH_TOKEN=${REDDIT_REFRESH_TOKEN:-}
      - REDDIT_USERNAME=${REDDIT_USERNAME:-sarah_nutri}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT:-linux:content-factory-sarah-nutri:0.1.0 by /u/sarah_nutri}
      - DIGISTORE24_API_KEY=${DIGISTORE24_API_KEY:-}
      - DIGISTORE24_AFFILIATE_ID=${DIGISTORE24_AFFILIATE_ID:-}
      - DIGISTORE24_MARKETPLACE_KEYWORDS=${DIGISTORE24_MARKETPLACE_KEYWORDS:-senior,elderly,caregiver,nutrition,mobility,sleep,joint,arthritis,memory,digestion,blood_pressure,back_pain,bone_health,weight_loss,appetite,protein,brain_health,hearing,vision,falls,balance,walking,home_care}
      - DIGISTORE24_MAX_PRODUCTS=${DIGISTORE24_MAX_PRODUCTS:-40}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./content_factory:/files
    extra_hosts:
      - "host.docker.internal:host-gateway"
